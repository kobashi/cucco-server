name: Deploy web clients to GitHub Pages

# clients/ hosts plain static sites (no build step): a landing page at the
# root, the reference client at /web/, the play client at /play/, and shared
# ES modules at /web-common/. GitHub Pages can't serve a nested directory
# directly, so this workflow assembles just the web-facing parts (excluding
# the Python client packages that also live under clients/) into the Pages
# artifact. Requires Settings > Pages > Source = "GitHub Actions" (one-time).
on:
  push:
    branches: [main]
    paths:
      - "clients/web/**"
      - "clients/play/**"
      - "clients/web-common/**"
      - "clients/index.html"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Assemble the static site (web-facing parts of clients/ only)
        run: |
          mkdir -p _site
          cp clients/index.html _site/
          cp -r clients/web _site/web
          cp -r clients/play _site/play
          cp -r clients/web-common _site/web-common
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
