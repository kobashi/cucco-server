<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cucco クライアント選択</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    }
    body { margin: 0; display: grid; place-items: center; min-height: 100vh; background: #f6f5f2; color: #1a1a1a; }
    @media (prefers-color-scheme: dark) { body { background: #17171a; color: #eee; } }
    main { text-align: center; padding: 2rem; }
    h1 { margin-bottom: 0.2em; }
    p.sub { opacity: 0.7; margin-top: 0; }
    .cards { display: flex; gap: 1.2rem; justify-content: center; flex-wrap: wrap; margin-top: 2rem; }
    a.client {
      display: block; width: 240px; padding: 1.4rem; border-radius: 14px; text-decoration: none;
      color: inherit; border: 1px solid rgba(128,128,128,0.35); transition: transform 0.15s, box-shadow 0.15s;
      background: rgba(128,128,128,0.06);
    }
    a.client:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.15); }
    a.client h2 { margin: 0 0 0.4rem; font-size: 1.15rem; }
    a.client p { margin: 0; font-size: 0.9rem; opacity: 0.75; }
    .badge { display: inline-block; font-size: 0.72rem; padding: 0.15em 0.6em; border-radius: 999px; background: #8a2b2b; color: #fff; margin-bottom: 0.6rem; }
    .badge.dev { background: #666; }
  </style>
</head>
<body>
  <main>
    <h1>Cucco</h1>
    <p class="sub">クライアントを選択してください</p>
    <div class="cards">
      <a class="client" id="play-link" href="play/">
        <span class="badge dev">開発中</span>
        <h2>プレイ用クライアント</h2>
        <p>卓を囲むレイアウトとアニメーションでゲームを楽しむための画面</p>
      </a>
      <a class="client" id="web-link" href="web/">
        <span class="badge">安定版</span>
        <h2>リファレンスクライアント</h2>
        <p>プロトコル全機能を備えた最小実装。動作検証・実装例向け</p>
      </a>
    </div>
  </main>
  <script>
    // Keep the shared link's ?ws=... (tunnel host) working: forward the query
    // string to whichever client is chosen.
    const qs = location.search;
    if (qs) {
      for (const a of document.querySelectorAll("a.client")) a.href += qs;
    }
  </script>
</body>
</html>
